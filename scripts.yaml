sequence:
  - alias: Set up variables
    variables:
      action_time_out: "{{ 'CONFIRM_' ~ context.id }}"
      action_ignore: "{{ 'DISMISS_' ~ context.id }}"
  - action: notify.notify_all_devices
    metadata: {}
    data:
      title: "WLANThermo: Tief-Temperatur Alarm"
      message: >-
        {% set alarms_active =
        states('sensor.wlanthermo_niedertemperatur_alarm') %}

        {# {% set alarms_active = "0b100001001" %} #}

        {% set data = namespace(active_alarms = 0, continue = false, alarm_list
        = [],  ch_temps = [], ch_alarm_active = []) %}


        {% set data.ch_names =  [states('text.wlanthermo_kanal_9_name'),
        states('text.wlanthermo_kanal_8_name'),
        states('text.wlanthermo_kanal_7_name'),
        states('text.wlanthermo_kanal_6_name'),
        states('text.wlanthermo_kanal_5_name'),
        states('text.wlanthermo_kanal_4_name'),
        states('text.wlanthermo_kanal_3_name'),
        states('text.wlanthermo_kanal_2_name'),
        states('text.wlanthermo_kanal_1_name')]  %}

        {% set data.ch_temps = [states('sensor.wlanthermo_kanal_9_temperatur'),
        states('sensor.wlanthermo_kanal_8_temperatur'),
        states('sensor.wlanthermo_kanal_7_temperatur'),
        states('sensor.wlanthermo_kanal_6_temperatur'),
        states('sensor.wlanthermo_kanal_5_temperatur'),
        states('sensor.wlanthermo_kanal_4_temperatur'),
        states('sensor.wlanthermo_kanal_3_temperatur'),
        states('sensor.wlanthermo_kanal_2_temperatur'),states('sensor.wlanthermo_kanal_1_temperatur')]%}

        {% set data.low_tresh = [states('number.wlanthermo_kanal_9_minimum'),
        states('number.wlanthermo_kanal_8_minimum'),
        states('number.wlanthermo_kanal_7_minimum'),
        states('number.wlanthermo_kanal_6_minimum'),
        states('number.wlanthermo_kanal_5_minimum'),
        states('number.wlanthermo_kanal_4_minimum'),
        states('number.wlanthermo_kanal_3_minimum'),
        states('number.wlanthermo_kanal_2_minimum'),
        states('number.wlanthermo_kanal_1_minimum')]%}

        {% set data.ch_alarm_type =
        [states('select.wlanthermo_kanal_9_alarmmodus'),
        states('select.wlanthermo_kanal_8_alarmmodus'),
        states('select.wlanthermo_kanal_7_alarmmodus'),
        states('select.wlanthermo_kanal_6_alarmmodus'),
        states('select.wlanthermo_kanal_5_alarmmodus'),
        states('select.wlanthermo_kanal_4_alarmmodus'),
        states('select.wlanthermo_kanal_3_alarmmodus'),
        states('select.wlanthermo_kanal_2_alarmmodus'),
        states('select.wlanthermo_kanal_1_alarmmodus')]%}


        {% set strings = namespace() %}



        {%for i in range(1,10)%} 
          {% set data.ch_alarm_active = data.ch_alarm_active +  [((alarms_active[-i] == "1") and ((data.ch_alarm_type[-i] == "push") or (data.ch_alarm_type[-i] == "push_buzzer")))]%}
          {%if ((alarms_active[-i] >= '1') and (data.ch_alarm_active[i-1] == true)) %}
              {% set data.alarm_list = data.alarm_list + [i]  %}
              {% set data.active_alarms = data.active_alarms + 1 %}
              {% set data.continue = true %}
          {%endif%}
        {%endfor%}

        {# {{ data}} #}

        {%if data.active_alarms == 0 %}
          {% set data.string = "Keine Alarm Notifikation aktiv!"  %}
        {%else%}
          {% set data.string = "" %}
          {%for i in data.alarm_list %}
            {% set data.string = data.string ~  "Ch " ~ i ~ ": "~ data.ch_names[-i] ~ ": " ~ data.ch_temps[-i] ~ " °C < "~ data.low_tresh[-i] ~ " °C\n"   %}
          {%endfor%}
        {%endif%}


        {{ data.string}}
      data:
        actions:
          - action: "{{ action_time_out }}"
            title: 5min Time-Out
          - action: "{{ action_ignore }}"
            title: ignore
        tag: wtherm_low_temp_alarm_notification
  - alias: Awaiting response
    wait_for_trigger:
      - event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_time_out }}"
        trigger: event
      - event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_ignore }}"
        trigger: event
    timeout:
      hours: 1
      minutes: 0
      seconds: 0
    continue_on_timeout: false
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.event.data.action == action_time_out }}"
        sequence:
          - metadata: {}
            data: {}
            action: input_boolean.turn_on
            target:
              entity_id: input_boolean.wlanthermo_low_temp_alarm_timeout
          - delay:
              hours: 0
              minutes: 5
              seconds: 0
              milliseconds: 0
            enabled: false
          - metadata: {}
            data: {}
            action: input_boolean.turn_off
            target:
              entity_id: input_boolean.wlanthermo_low_temp_alarm_timeout
            enabled: false
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.event.data.action == action_ignore }}"
        sequence: []
alias: WLANThermo Niedrigtemperaturalarm mit Time-Out
mode: restart
description: ""
